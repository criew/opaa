databaseChangeLog:
  - changeSet:
      id: 005-add-documents-total-to-indexing-jobs
      author: opaa
      comment: "Add documents_total column for progress tracking during indexing"
      changes:
        - addColumn:
            tableName: indexing_jobs
            columns:
              - column:
                  name: documents_total
                  type: int
                  defaultValueNumeric: 0
      rollback:
        - dropColumn:
            tableName: indexing_jobs
            columnName: documents_total
