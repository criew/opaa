databaseChangeLog:
  - changeSet:
      id: 005-create-workspaces
      author: opaa
      comment: "Create workspaces table for workspace ownership and type"
      preConditions:
        onFail: MARK_RAN
        onError: HALT
        - tableExists:
            tableName: users
      changes:
        - createTable:
            tableName: workspaces
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: varchar(2000)
                  constraints:
                    nullable: true
              - column:
                  name: type
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: owner_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: workspaces
            baseColumnNames: owner_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_workspaces_owner
            onDelete: RESTRICT
        - addCheckConstraint:
            tableName: workspaces
            constraintName: chk_workspaces_type
            condition: type IN ('PERSONAL', 'SHARED')
      rollback:
        - dropTable:
            tableName: workspaces

  - changeSet:
      id: 005-create-workspace-memberships
      author: opaa
      comment: "Create workspace_memberships table for role-based workspace membership"
      preConditions:
        onFail: MARK_RAN
        onError: HALT
        - tableExists:
            tableName: users
        - tableExists:
            tableName: workspaces
      changes:
        - createTable:
            tableName: workspace_memberships
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: workspace_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: workspace_memberships
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_workspace_memberships_user
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: workspace_memberships
            baseColumnNames: workspace_id
            referencedTableName: workspaces
            referencedColumnNames: id
            constraintName: fk_workspace_memberships_workspace
            onDelete: CASCADE
        - addUniqueConstraint:
            tableName: workspace_memberships
            columnNames: user_id, workspace_id
            constraintName: uk_workspace_memberships_user_workspace
        - addCheckConstraint:
            tableName: workspace_memberships
            constraintName: chk_workspace_memberships_role
            condition: role IN ('VIEWER', 'EDITOR', 'ADMIN', 'OWNER')
      rollback:
        - dropTable:
            tableName: workspace_memberships
