spring:
  application:
    name: opaa
  profiles:
    default: local

# Placeholder: LLM configuration
opaa:
  llm:
    provider: ${OPAA_LLM_PROVIDER:openai}
    api-key: ${OPAA_LLM_API_KEY:}
    api-base: ${OPAA_LLM_API_BASE:https://api.openai.com}
    model: ${OPAA_LLM_MODEL:gpt-4o}
  embedding:
    model: ${OPAA_EMBEDDING_MODEL:text-embedding-3-small}
  pgvector:
    dimensions: ${OPAA_PGVECTOR_DIMENSIONS:1536}
  documents:
    path: ${OPAA_DOCUMENTS_PATH:./documents}

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/opaa
    username: opaa
    password: opaa
  liquibase:
    enabled: false
  ai:
    openai:
      api-key: ${OPAA_LLM_API_KEY:sk-placeholder}
    ollama:
      base-url: ${OPAA_OLLAMA_BASE_URL:http://localhost:11434}

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/opaa
    username: opaa
    password: opaa
  ai:
    openai:
      api-key: ${OPAA_LLM_API_KEY:sk-placeholder}
    ollama:
      base-url: ${OPAA_OLLAMA_BASE_URL:http://ollama:11434}

---
spring:
  config:
    activate:
      on-profile: mock
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.liquibase.LiquibaseAutoConfiguration
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaAutoConfiguration
  ai:
    openai:
      api-key: mock-key
