server:
  address: ${OPAA_SERVER_ADDRESS:localhost}

spring:
  application:
    name: opaa
  profiles:
    default: local
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  datasource:
    url: ${OPAA_DB_URL:jdbc:postgresql://localhost:5432/opaa?prepareThreshold=0}
    username: ${OPAA_DB_USERNAME:opaa}
    password: ${OPAA_DB_PASSWORD:opaa}
  liquibase:
    enabled: true
  ai:
    model:
      chat: ${OPAA_AI_CHAT_PROVIDER:openai}
      embedding: ${OPAA_AI_EMBEDDING_PROVIDER:openai}
    openai:
      api-key: ${OPAA_OPENAI_API_KEY:sk-placeholder}
      base-url: ${OPAA_OPENAI_BASE_URL:https://api.openai.com}
      chat:
        api-key: ${OPAA_OPENAI_CHAT_API_KEY:${OPAA_OPENAI_API_KEY:sk-placeholder}}
        base-url: ${OPAA_OPENAI_CHAT_BASE_URL:${OPAA_OPENAI_BASE_URL:https://api.openai.com}}
        options:
          model: ${OPAA_OPENAI_CHAT_MODEL:gpt-4o}
          temperature: ${OPAA_OPENAI_CHAT_TEMPERATURE:0.7}
          maxTokens: ${OPAA_OPENAI_CHAT_MAX_TOKENS:2000}
      embedding:
        api-key: ${OPAA_OPENAI_EMBEDDING_API_KEY:${OPAA_OPENAI_API_KEY:sk-placeholder}}
        base-url: ${OPAA_OPENAI_EMBEDDING_BASE_URL:${OPAA_OPENAI_BASE_URL:https://api.openai.com}}
        options:
          model: ${OPAA_OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
    ollama:
      chat:
        options:
          model: ${OPAA_OLLAMA_CHAT_MODEL:phi3:mini}
      embedding:
        options:
          model: ${OPAA_OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
    vectorstore:
      pgvector:
        initialize-schema: true
        index-type: hnsw
        distance-type: ${OPAA_PGVECTOR_DISTANCE_TYPE:cosine_distance}
        dimensions: ${OPAA_PGVECTOR_DIMENSIONS:1536}

opaa:
  http:
    force-http1: ${OPAA_HTTP_FORCE_HTTP1:false}
  indexing:
    document-path: ${OPAA_INDEXING_DOCUMENT_PATH:./documents}
    chunk-size: ${OPAA_INDEXING_CHUNK_SIZE:1000}
    batch-size: ${OPAA_INDEXING_BATCH_SIZE:50}
    retry-attempts: ${OPAA_INDEXING_RETRY_ATTEMPTS:3}
    thread-pool:
      core-size: ${OPAA_INDEXING_THREAD_POOL_CORE_SIZE:2}
      max-size: ${OPAA_INDEXING_THREAD_POOL_MAX_SIZE:4}
      queue-capacity: ${OPAA_INDEXING_THREAD_POOL_QUEUE_CAPACITY:20}
  rate-limit:
    enabled: ${OPAA_RATE_LIMIT_ENABLED:true}
    query:
      max-requests: ${OPAA_RATE_LIMIT_QUERY_MAX_REQUESTS:10}
      window-seconds: ${OPAA_RATE_LIMIT_QUERY_WINDOW_SECONDS:60}
      global-max-requests: ${OPAA_RATE_LIMIT_QUERY_GLOBAL_MAX_REQUESTS:100}
    indexing:
      max-requests: ${OPAA_RATE_LIMIT_INDEXING_MAX_REQUESTS:1}
      window-seconds: ${OPAA_RATE_LIMIT_INDEXING_WINDOW_SECONDS:60}
      global-max-requests: ${OPAA_RATE_LIMIT_INDEXING_GLOBAL_MAX_REQUESTS:5}
  cors:
    allowed-origins: ${OPAA_CORS_ALLOWED_ORIGINS:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    org.hibernate.orm.connections.pooling: WARN

---
spring:
  config:
    activate:
      on-profile: local
  ai:
    ollama:
      base-url: ${OPAA_OLLAMA_BASE_URL:http://localhost:11434}

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: ${OPAA_DB_URL:jdbc:postgresql://postgres:5432/opaa?prepareThreshold=0}
  ai:
    ollama:
      base-url: ${OPAA_OLLAMA_BASE_URL:http://ollama:11434}

---
spring:
  config:
    activate:
      on-profile: mock
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.liquibase.LiquibaseAutoConfiguration
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaAutoConfiguration
  ai:
    openai:
      api-key: mock-key
management:
  health:
    chat:
      enabled: false
    embeddings:
      enabled: false
    vectorstore:
      enabled: false
