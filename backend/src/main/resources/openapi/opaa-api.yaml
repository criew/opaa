openapi: 3.0.3
info:
  title: OPAA API
  description: Open Project AI Assistant REST API
  version: 0.1.0
  license:
    name: AGPL-3.0
    url: https://www.gnu.org/licenses/agpl-3.0.html

paths:
  /api/health:
    get:
      operationId: getHealth
      tags: [system]
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/v1/indexing/trigger:
    post:
      operationId: triggerIndexing
      tags: [indexing]
      summary: Trigger document indexing
      description: |
        Triggers document indexing. Without a request body, indexes documents
        from the configured local filesystem path. With a request body containing
        a URL, crawls an Apache mod_autoindex HTTP directory listing and indexes
        all discovered documents.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IndexingTriggerRequest"
      responses:
        "202":
          description: Indexing triggered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IndexingStatusResponse"
        "409":
          description: Indexing already running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IndexingStatusResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/indexing/status:
    get:
      operationId: getIndexingStatus
      tags: [indexing]
      summary: Get current indexing status
      responses:
        "200":
          description: Current indexing status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IndexingStatusResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/query:
    post:
      operationId: submitQuery
      tags: [query]
      summary: Ask a question against indexed documents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryRequest"
      responses:
        "200":
          description: Query answered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/workspaces:
    get:
      operationId: listWorkspaces
      tags: [workspace]
      summary: List workspaces the current user is a member of
      responses:
        "200":
          description: List of workspaces
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      operationId: createWorkspace
      tags: [workspace]
      summary: Create a new shared workspace (system admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkspaceRequest"
      responses:
        "201":
          description: Workspace created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/workspaces/{workspaceId}:
    parameters:
      - name: workspaceId
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      operationId: getWorkspace
      tags: [workspace]
      summary: Get workspace details
      responses:
        "200":
          description: Workspace details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      operationId: updateWorkspace
      tags: [workspace]
      summary: Update workspace name and description (admin/owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkspaceRequest"
      responses:
        "200":
          description: Workspace updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

    delete:
      operationId: deleteWorkspace
      tags: [workspace]
      summary: Delete a workspace (owner or system admin only)
      responses:
        "204":
          description: Workspace deleted
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/workspaces/{workspaceId}/documents:
    parameters:
      - name: workspaceId
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      operationId: listWorkspaceDocuments
      tags: [workspace]
      summary: List documents in a workspace
      responses:
        "200":
          description: List of workspace documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceDocumentResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/workspaces/{workspaceId}/members:
    parameters:
      - name: workspaceId
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      operationId: listWorkspaceMembers
      tags: [workspace]
      summary: List workspace members
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceMemberResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      operationId: addWorkspaceMember
      tags: [workspace]
      summary: Add a member to a workspace (admin/owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkspaceAddMemberRequest"
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMemberResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/workspaces/{workspaceId}/members/{userId}:
    parameters:
      - name: workspaceId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid

    delete:
      operationId: removeWorkspaceMember
      tags: [workspace]
      summary: Remove a member from a workspace (admin/owner only)
      responses:
        "204":
          description: Member removed
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/workspaces/{workspaceId}/members/{userId}/role:
    parameters:
      - name: workspaceId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid

    put:
      operationId: updateWorkspaceMemberRole
      tags: [workspace]
      summary: Update a member's role (admin/owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkspaceRoleUpdateRequest"
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMemberResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/workspaces/{workspaceId}/transfer-ownership:
    parameters:
      - name: workspaceId
        in: path
        required: true
        schema:
          type: string
          format: uuid

    post:
      operationId: transferWorkspaceOwnership
      tags: [workspace]
      summary: Transfer workspace ownership to another member (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkspaceTransferOwnershipRequest"
      responses:
        "204":
          description: Ownership transferred
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: UP

    IndexingStatusResponse:
      type: object
      required: [status, documentCount, totalDocuments, documentsSkipped, timestamp]
      properties:
        status:
          $ref: "#/components/schemas/IndexingStatus"
        documentCount:
          type: integer
          example: 42
        totalDocuments:
          type: integer
          example: 42
        documentsSkipped:
          type: integer
          example: 0
        message:
          type: string
          nullable: true
          example: Indexing completed successfully
        timestamp:
          type: string
          format: date-time

    IndexingStatus:
      type: string
      enum: [IDLE, RUNNING, COMPLETED, FAILED]
      example: COMPLETED

    QueryRequest:
      type: object
      required: [question]
      properties:
        question:
          type: string
          minLength: 1
          maxLength: 2000
          pattern: ".*\\S.*"
          example: What is the project architecture?
        conversationId:
          type: string
          pattern: "^[a-zA-Z0-9-]{1,50}$"
          example: c5aaec8d-307f-4f2f-b43e-f7ea600435eb
        workspaceIds:
          type: array
          items:
            type: string
            format: uuid
          description: Optional list of workspace IDs to restrict the query to

    QueryResponse:
      type: object
      required: [answer, sources, metadata, conversationId]
      properties:
        answer:
          type: string
          example: The project uses a modular monolith architecture...
        sources:
          type: array
          items:
            $ref: "#/components/schemas/SourceReference"
        metadata:
          $ref: "#/components/schemas/QueryMetadata"
        conversationId:
          type: string
          example: c5aaec8d-307f-4f2f-b43e-f7ea600435eb

    SourceReference:
      type: object
      required: [fileName, relevanceScore, matchCount, cited]
      properties:
        fileName:
          type: string
          example: architecture-overview.md
        workspaceName:
          type: string
          nullable: true
          example: Engineering
        relevanceScore:
          type: number
          format: double
          minimum: 0
          maximum: 1
          example: 0.92
        matchCount:
          type: integer
          example: 3
        indexedAt:
          type: string
          format: date-time
          nullable: true
        cited:
          type: boolean
          example: true

    QueryMetadata:
      type: object
      required: [model, tokenCount, durationMs]
      properties:
        model:
          type: string
          example: gpt-4o
        tokenCount:
          type: integer
          example: 847
        durationMs:
          type: integer
          format: int64
          example: 1523

    IndexingTriggerRequest:
      type: object
      description: Optional request body for URL-based indexing
      properties:
        url:
          type: string
          format: uri
          description: URL of an Apache mod_autoindex directory listing to crawl
          example: https://files.example.com/documents/
        proxy:
          type: string
          description: Proxy server in host:port format
          example: proxy.example.com:8080
        credentials:
          type: string
          description: Basic auth credentials in user:password format
          example: admin:secret
        insecureSsl:
          type: boolean
          description: Skip SSL certificate verification
          default: false

    ErrorResponse:
      type: object
      required: [error, status, timestamp]
      properties:
        error:
          type: string
        status:
          type: integer
        timestamp:
          type: string
          format: date-time

    WorkspaceRole:
      type: string
      enum: [VIEWER, EDITOR, ADMIN, OWNER]
      example: EDITOR

    WorkspaceType:
      type: string
      enum: [PERSONAL, SHARED]
      example: SHARED

    WorkspaceRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          example: Engineering
        description:
          type: string
          maxLength: 2000
          nullable: true
          example: Engineering team workspace
        ownerId:
          type: string
          format: uuid
          nullable: true
          description: Required when creating a workspace
        initialMembers:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/WorkspaceMemberRequest"

    WorkspaceMemberRequest:
      type: object
      required: [userId, role]
      properties:
        userId:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/WorkspaceRole"

    WorkspaceListResponse:
      type: object
      required: [id, name, type, memberCount, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Engineering
        description:
          type: string
          nullable: true
        type:
          $ref: "#/components/schemas/WorkspaceType"
        memberCount:
          type: integer
          example: 5
        userRole:
          $ref: "#/components/schemas/WorkspaceRole"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    WorkspaceMemberResponse:
      type: object
      required: [userId, role, createdAt]
      properties:
        userId:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/WorkspaceRole"
        createdAt:
          type: string
          format: date-time

    WorkspaceResponse:
      type: object
      required: [id, name, type, ownerId, memberCount, roleCounts, members, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Engineering
        description:
          type: string
          nullable: true
        type:
          $ref: "#/components/schemas/WorkspaceType"
        ownerId:
          type: string
          format: uuid
        memberCount:
          type: integer
          example: 5
        userRole:
          $ref: "#/components/schemas/WorkspaceRole"
        roleCounts:
          type: object
          additionalProperties:
            type: integer
            format: int64
          example:
            VIEWER: 2
            EDITOR: 1
            ADMIN: 1
            OWNER: 1
        members:
          type: array
          items:
            $ref: "#/components/schemas/WorkspaceMemberResponse"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    WorkspaceAddMemberRequest:
      type: object
      required: [userId]
      properties:
        userId:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/WorkspaceRole"

    WorkspaceRoleUpdateRequest:
      type: object
      required: [role]
      properties:
        role:
          $ref: "#/components/schemas/WorkspaceRole"

    WorkspaceTransferOwnershipRequest:
      type: object
      required: [userId]
      properties:
        userId:
          type: string
          format: uuid

    WorkspaceDocumentResponse:
      type: object
      required: [id, name, type, uploadedAt, ownerDisplayName]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: architecture-overview.md
        type:
          type: string
          example: MARKDOWN
        uploadedAt:
          type: string
          format: date-time
        ownerDisplayName:
          type: string
          example: Alice

  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
