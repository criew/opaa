openapi: 3.0.3
info:
  title: OPAA API
  description: Open Project AI Assistant REST API
  version: 0.1.0
  license:
    name: AGPL-3.0
    url: https://www.gnu.org/licenses/agpl-3.0.html

paths:
  /api/health:
    get:
      operationId: getHealth
      tags: [system]
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/v1/indexing/trigger:
    post:
      operationId: triggerIndexing
      tags: [indexing]
      summary: Trigger document indexing
      description: |
        Triggers document indexing. Without a request body, indexes documents
        from the configured local filesystem path. With a request body containing
        a URL, crawls an Apache mod_autoindex HTTP directory listing and indexes
        all discovered documents.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IndexingTriggerRequest"
      responses:
        "202":
          description: Indexing triggered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IndexingStatusResponse"
        "409":
          description: Indexing already running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IndexingStatusResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/indexing/status:
    get:
      operationId: getIndexingStatus
      tags: [indexing]
      summary: Get current indexing status
      responses:
        "200":
          description: Current indexing status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IndexingStatusResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/query:
    post:
      operationId: submitQuery
      tags: [query]
      summary: Ask a question against indexed documents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryRequest"
      responses:
        "200":
          description: Query answered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: UP

    IndexingStatusResponse:
      type: object
      required: [status, documentCount, totalDocuments, documentsSkipped, timestamp]
      properties:
        status:
          $ref: "#/components/schemas/IndexingStatus"
        documentCount:
          type: integer
          example: 42
        totalDocuments:
          type: integer
          example: 42
        documentsSkipped:
          type: integer
          example: 0
        message:
          type: string
          nullable: true
          example: Indexing completed successfully
        timestamp:
          type: string
          format: date-time

    IndexingStatus:
      type: string
      enum: [IDLE, RUNNING, COMPLETED, FAILED]
      example: COMPLETED

    QueryRequest:
      type: object
      required: [question]
      properties:
        question:
          type: string
          minLength: 1
          maxLength: 2000
          pattern: ".*\\S.*"
          example: What is the project architecture?
        conversationId:
          type: string
          pattern: "^[a-zA-Z0-9-]{1,50}$"
          example: c5aaec8d-307f-4f2f-b43e-f7ea600435eb

    QueryResponse:
      type: object
      required: [answer, sources, metadata, conversationId]
      properties:
        answer:
          type: string
          example: The project uses a modular monolith architecture...
        sources:
          type: array
          items:
            $ref: "#/components/schemas/SourceReference"
        metadata:
          $ref: "#/components/schemas/QueryMetadata"
        conversationId:
          type: string
          example: c5aaec8d-307f-4f2f-b43e-f7ea600435eb

    SourceReference:
      type: object
      required: [fileName, relevanceScore, matchCount, cited]
      properties:
        fileName:
          type: string
          example: architecture-overview.md
        relevanceScore:
          type: number
          format: double
          minimum: 0
          maximum: 1
          example: 0.92
        matchCount:
          type: integer
          example: 3
        indexedAt:
          type: string
          format: date-time
          nullable: true
        cited:
          type: boolean
          example: true

    QueryMetadata:
      type: object
      required: [model, tokenCount, durationMs]
      properties:
        model:
          type: string
          example: gpt-4o
        tokenCount:
          type: integer
          example: 847
        durationMs:
          type: integer
          format: int64
          example: 1523

    IndexingTriggerRequest:
      type: object
      description: Optional request body for URL-based indexing
      properties:
        url:
          type: string
          format: uri
          description: URL of an Apache mod_autoindex directory listing to crawl
          example: https://files.example.com/documents/
        proxy:
          type: string
          description: Proxy server in host:port format
          example: proxy.example.com:8080
        credentials:
          type: string
          description: Basic auth credentials in user:password format
          example: admin:secret
        insecureSsl:
          type: boolean
          description: Skip SSL certificate verification
          default: false

    ErrorResponse:
      type: object
      required: [error, status, timestamp]
      properties:
        error:
          type: string
        status:
          type: integer
        timestamp:
          type: string
          format: date-time

  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
