# WARNING: Development-only compose setup.
# It contains insecure defaults (e.g., admin/admin and placeholder secrets)
# and must not be used as-is for production deployments.
services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: opaa-postgres
    env_file: .env.docker
    environment:
      POSTGRES_DB: opaa
      POSTGRES_USER: ${OPAA_DB_USERNAME:-opaa}
      POSTGRES_PASSWORD: ${OPAA_DB_PASSWORD:-opaa}
    ports:
      - "5432:5432"
    volumes:
      - opaa-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opaa} -d ${POSTGRES_DB:-opaa}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: opaa-backend
    env_file: .env.docker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${OPAA_BACKEND_PORT:-8081}:8080"
    volumes:
      - ${OPAA_INDEXING_DOCUMENT_PATH_HOST:-./documents}:/app/documents
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: opaa-frontend
    ports:
      - "${OPAA_FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: opaa-keycloak
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8180
    ports:
      - "8180:8180"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    profiles:
      - oidc

volumes:
  opaa-postgres-data:
